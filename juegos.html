<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GameHub - Tienda Gamer</title>
    <link rel="stylesheet" href="estilos.css">
    <link rel="shortcut icon" href="Logo.png" type="image/x-icon">
</head>
<body>

<header>
    <div class="header-left">
        <div class="logo">GameHub</div>

        <div class="auth-buttons">
            <button class="btn-register" onclick="abrirRegistro()">Registrarse</button>
            <button class="btn-login" onclick="abrirLogin()">Iniciar sesión</button>
        </div>
    </div>

    <nav>
        <ul>
            <li>Inicio</li>
            <li>Consolas</li>
            <li>Juegos</li>
            <li>Accesorios</li>
        </ul>
    </nav>
</header>

<section class="banner"></section>

<footer>
    <p>© 2026 GameHub</p>
</footer>

<!-- MODAL REGISTRO -->
<div id="modalRegistro" class="modal">
    <div class="modal-contenido">
        <span class="cerrar" onclick="cerrarRegistro()">&times;</span>
        <h2>Registro 🎮</h2>
        <input type="text" id="nuevoUsuario" placeholder="Usuario">
        <input type="password" id="nuevaPassword" placeholder="Contraseña">
        <button onclick="registrarUsuario()">Registrarse</button>
    </div>
</div>

<!-- MODAL LOGIN -->
<div id="modalLogin" class="modal">
    <div class="modal-contenido">
        <span class="cerrar" onclick="cerrarLogin()">&times;</span>
        <h2>Iniciar Sesión 🎮</h2>
        <input type="text" id="usuario" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="iniciarSesion()">Entrar</button>
    </div>
</div>

<script src="funciones.js"></script> 
</body>
</html>
