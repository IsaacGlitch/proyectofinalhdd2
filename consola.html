<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="estilos/estilosconsola.css">
</head>

<body>
    <div class="container">
        <div class="carousel">
            <div class="carousel-track">
                <div class="carousel-slide">
                    <img src="https://picsum.photos/id/1015/800/400">
                    <div class="caption">Paisaje Natural</div>
                </div>
                <div class="carousel-slide">
                    <img src="https://picsum.photos/id/1016/800/400">
                    <div class="caption">Montañas</div>
                </div>
                <div class="carousel-slide">
                    <img src="https://picsum.photos/id/1018/800/400">
                    <div class="caption">Bosque</div>
                </div>
            </div>

            <button class="carousel-btn prev">&#10094;</button>
            <button class="carousel-btn next">&#10095;</button>

            <div class="carousel-dots">
                <span class="dot active"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>

        <aside class="filter-container">
            <div class="filter-title">🎮 Filtrar por Consola</div>

            <input type="text" id="buscador" placeholder="Buscar consola..."
                style="width:100%;padding:8px;margin-bottom:10px;">

            <label class="filter-option">
                <input type="checkbox" name="console" value="PlayStation 5">
                <span class="console-name">PlayStation 5</span>
            </label>
            <label class="filter-option">
                <input type="checkbox" name="console" value="PlayStation 4">
                <span class="console-name">PlayStation 4</span>
            </label>
            <label class="filter-option">
                <input type="checkbox" name="console" value="Xbox Series X/S">
                <span class="console-name">Xbox Series X/S</span>
            </label>
            <label class="filter-option">
                <input type="checkbox" name="console" value="Xbox One">
                <span class="console-name">Xbox One</span>
            </label>
            <label class="filter-option">
                <input type="checkbox" name="console" value="Nintendo Switch">
                <span class="console-name">Nintendo Switch</span>
            </label>

            <div class="top-bar">
                <div class="top-left">
                    <span id="contador">Mostrando 0 productos</span>
                </div>
                <div class="top-right">
                    <div class="control">
                        <label>Ordenar por</label>
                        <select id="ordenar">
                            <option value="default">Recomendados</option>
                            <option value="recientes">Más recientes</option>
                        </select>
                    </div>
                </div>
            </div>

            <button class="apply-btn">Aplicar Filtro</button>
        </aside>

        <div class="consolas-div">
            <div class="paginacion">
    <button id="prevPage">⬅ Anterior</button>
    <span id="pageInfo"></span>
    <button id="nextPage">Siguiente ➡</button>
</div>
            <div class="card" data-console="PlayStation 5">
                <img src="https://picsum.photos/id/1/300/200">
                <div class="card-content">
                    <h3>PlayStation 5</h3>
                </div>
            </div>

            <div class="card" data-console="Xbox Series X/S">
                <img src="https://picsum.photos/id/2/300/200">
                <div class="card-content">
                    <h3>Xbox Series X</h3>
                </div>
            </div>

            <div class="card" data-console="Nintendo Switch">
                <img src="https://picsum.photos/id/3/300/200">
                <div class="card-content">
                    <h3>Nintendo Switch</h3>
                </div>
            </div>

            <div class="card" data-console="PlayStation 4">
                <img src="https://picsum.photos/id/1/300/200">
                <div class="card-content">
                    <h3>PlayStation 4</h3>
                </div>
            </div>

            <div class="card" data-console="Xbox One">
                <img src="https://picsum.photos/id/1/300/200">
                <div class="card-content">
                    <h3>Xbox One</h3>
                </div>
            </div>

        </div>
    </div>

<script>
const checkboxes = document.querySelectorAll('input[name="console"]');
const cards = document.querySelectorAll('.card');
const buscador = document.getElementById('buscador');
const ordenar = document.getElementById('ordenar');

function filtrar() {
    const selected = Array.from(checkboxes)
        .filter(cb => cb.checked)
        .map(cb => cb.value);

    const texto = buscador.value.toLowerCase();

    cards.forEach(card => {
        const tipo = card.dataset.console;
        const nombre = card.querySelector('h3').textContent.toLowerCase();

        if (
            (selected.length === 0 || selected.includes(tipo)) &&
            nombre.includes(texto)
        ) {
            card.style.display = 'block';
        } else {
            card.style.display = 'none';
        }
    });

    actualizarContador();
}

function actualizarContador() {
    const visibles = Array.from(cards).filter(c => c.style.display !== 'none');
    document.getElementById('contador').textContent =
        `Mostrando ${visibles.length} productos`;
}

buscador.addEventListener('input', filtrar);
checkboxes.forEach(cb => cb.addEventListener('change', filtrar));
document.querySelector('.apply-btn').addEventListener('click', filtrar);

ordenar.addEventListener('change', () => {
    const contenedor = document.querySelector('.consolas-div');
    const cardsArray = Array.from(cards);

    if (ordenar.value === 'recientes') {
        cardsArray.reverse();
    }

    contenedor.innerHTML = '';
    cardsArray.forEach(card => contenedor.appendChild(card));
});

actualizarContador();

const track = document.querySelector('.carousel-track');
const slides = Array.from(track.children);
const nextButton = document.querySelector('.next');
const prevButton = document.querySelector('.prev');
const dots = document.querySelectorAll('.dot');

let currentIndex = 0;

function updateCarousel(index) {
    track.style.transform = 'translateX(-' + index * 100 + '%)';
    dots.forEach(dot => dot.classList.remove('active'));
    dots[index].classList.add('active');
    currentIndex = index;
}

nextButton.addEventListener('click', () => {
    updateCarousel((currentIndex + 1) % slides.length);
});

prevButton.addEventListener('click', () => {
    updateCarousel((currentIndex - 1 + slides.length) % slides.length);
});
</script>

</body>
</html>
