<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Consolas - GameHub</title>
    <link rel="stylesheet" href="estilos/estilosconsola.css">
</head>

<body>

<header>
    <div class="header-left">
        <div class="logo">GameHub</div>

        <div class="auth-buttons">
            <button class="btn-register">Registrarse</button>
            <button class="btn-login">Iniciar sesión</button>
        </div>
    </div>

    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="consola.html">Consolas</a></li>
            <li><a href="juegos.html">Juegos</a></li>
            <li><a href="accesorios.html">Accesorios</a></li>
        </ul>
    </nav>
</header>

<div class="container">

    <!-- CARRUSEL -->
    <div class="carousel">
        <div class="carousel-track">
            <div class="carousel-slide"><img src="https://picsum.photos/id/1015/800/400"></div>
            <div class="carousel-slide"><img src="https://picsum.photos/id/1016/800/400"></div>
            <div class="carousel-slide"><img src="https://picsum.photos/id/1018/800/400"></div>
        </div>

        <button class="carousel-btn prev">❮</button>
        <button class="carousel-btn next">❯</button>
    </div>

    <!-- FILTRO -->
    <aside class="filter-container">

        <h3>Filtrar</h3>

        <input type="text" id="buscador" placeholder="Buscar...">

        <label><input type="checkbox" value="PlayStation 5"> PS5</label>
        <label><input type="checkbox" value="PlayStation 4"> PS4</label>
        <label><input type="checkbox" value="Xbox Series X/S"> Xbox Series</label>
        <label><input type="checkbox" value="Xbox One"> Xbox One</label>
        <label><input type="checkbox" value="Nintendo Switch"> Switch</label>

        <p id="contador">Mostrando 0 productos</p>

        <button class="apply-btn">Aplicar</button>

    </aside>

    <!-- PRODUCTOS -->
    <div class="consolas-div">

        <div class="card" data-console="PlayStation 5">
            <img src="https://picsum.photos/id/1/300/200">
            <div class="card-content">
                <h3>PlayStation 5</h3>
                <p>Edición estándar</p>
            </div>
        </div>

        <div class="card" data-console="Xbox Series X/S">
            <img src="https://picsum.photos/id/2/300/200">
            <div class="card-content">
                <h3>Xbox Series X</h3>
                <p>Alta potencia</p>
            </div>
        </div>

        <div class="card" data-console="Nintendo Switch">
            <img src="https://picsum.photos/id/3/300/200">
            <div class="card-content">
                <h3>Nintendo Switch</h3>
                <p>Modelo OLED</p>
            </div>
        </div>

        <div class="card" data-console="PlayStation 4">
            <img src="https://picsum.photos/id/4/300/200">
            <div class="card-content">
                <h3>PlayStation 4</h3>
                <p>Clásica</p>
            </div>
        </div>

        <div class="card" data-console="Xbox One">
            <img src="https://picsum.photos/id/5/300/200">
            <div class="card-content">
                <h3>Xbox One</h3>
                <p>Buen rendimiento</p>
            </div>
        </div>

    </div>

</div>

<script>

/* ===== VARIABLES ===== */
const checkboxes = document.querySelectorAll('input[type="checkbox"]');
const cards = document.querySelectorAll('.card');
const buscador = document.getElementById('buscador');
const contador = document.getElementById('contador');

/* ===== FILTRO ===== */
function filtrar() {

    const seleccionados = Array.from(checkboxes)
        .filter(c => c.checked)
        .map(c => c.value);

    const texto = buscador.value.toLowerCase();

    cards.forEach(card => {

        const tipo = card.dataset.console;
        const nombre = card.querySelector('h3').textContent.toLowerCase();

        const coincideTipo =
            seleccionados.length === 0 || seleccionados.includes(tipo);

        const coincideTexto = nombre.includes(texto);

        if (coincideTipo && coincideTexto) {
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }

    });

    actualizarContador();
}

/* ===== CONTADOR ===== */
function actualizarContador() {
    const visibles = Array.from(cards).filter(c => c.style.display !== "none");
    contador.textContent = "Mostrando " + visibles.length + " productos";
}

/* EVENTOS */
buscador.addEventListener('input', filtrar);
checkboxes.forEach(c => c.addEventListener('change', filtrar));
document.querySelector('.apply-btn').addEventListener('click', filtrar);

/* ===== CARRUSEL ===== */
const track = document.querySelector('.carousel-track');
const slides = document.querySelectorAll('.carousel-slide');
const next = document.querySelector('.next');
const prev = document.querySelector('.prev');

let index = 0;

function moverCarrusel(i) {
    track.style.transform = `translateX(-${i * 100}%)`;
    index = i;
}

next.addEventListener('click', () => {
    moverCarrusel((index + 1) % slides.length);
});

prev.addEventListener('click', () => {
    moverCarrusel((index - 1 + slides.length) % slides.length);
});

/* AUTO */
setInterval(() => {
    moverCarrusel((index + 1) % slides.length);
}, 4000);

/* INIT */
actualizarContador();

</script>

</body>
</html>
